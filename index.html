function pT(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
// Check if today is the actual rally day for the selected day
function isRallyDay(){
  const now=new Date(),m=now.getMonth()+1,d=now.getDate();
  if(cDay==='day1')return m===5&&d===23;
  if(cDay==='day2')return m===5&&d===24;
  return false;
}
function fD(m){const a=Math.abs(m),h=Math.floor(a/60),n=a%60;return h>0?h+'h'+n.toString().padStart(2,'0')+'m':n+'m';}
function dK(a,b,c,d){const R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z));}

let cDay='day1',gLat=null,gLng=null,gSt='',sFl=false,iM=false,bgm=null,vM='list',mapZoom='nav',showMapMenu=false;

function selectMapZoom(zoom){
  mapZoom=zoom;showMapMenu=false;vM='map';lastRouteNI=-1;
  initMap();
  const mw=document.getElementById('mapWrap');
  mw.style.display='block';mw.className='full';
  const st=STOPS[cDay];
  const zoomLevels={nav:17,area:13,all:8};
  if(zoom==='all'){
    showRouteOnly(st);
  } else if(gLat){
    const ni=fN(st);
    updateMap(gLat,gLng,st,ni.i);
    if(map)map.setZoom(zoomLevels[zoom]);
  } else {
    showRouteOnly(st);
    if(map)map.setZoom(zoomLevels[zoom]);
  }
  rnd();
}

function setView(mode){
  if(mode==='map'){selectMapZoom(mapZoom);return;}
  showMapMenu=false;vM=mode;lastRouteNI=-1;
  if(mode==='map'){
    initMap();
    const mw=document.getElementById('mapWrap');
    mw.style.display='block';
    mw.className='full';
    const st=STOPS[cDay];
    if(gLat){
      const ni=fN(st);
      updateMap(gLat,gLng,st,ni.i);
    } else {
      showRouteOnly(st);
    }
  } else {
    document.getElementById('mapWrap').style.display='none';
  }
  rnd();
}

function showRouteOnly(stops){
  initMap();
  document.getElementById('mapWrap').style.display='block';
  clearMap();

  const bounds=new google.maps.LatLngBounds();

let mDirectionsRenderer=null;
let mPolylines=[];
function clearMap(){
  if(mMe){mMe.setMap(null);mMe=null;}
  if(mTgt){mTgt.setMap(null);mTgt=null;}
  mStops.forEach(m=>m.setMap(null));mStops=[];
  if(mDirectionsRenderer){mDirectionsRenderer.setMap(null);mDirectionsRenderer=null;}
  mPolylines.forEach(p=>p.setMap(null));mPolylines=[];
}
function fetchGoogleRoute(stops){
  if(stops.length<2)return;
  const ds=new google.maps.DirectionsService();
  // Split into noHwy and highway segments
  let segStart=0;
  for(let i=0;i<stops.length-1;i++){
    const curNoHwy=!!stops[i].noHwy;
    const nextNoHwy=!!stops[i+1].noHwy;
    // When noHwy flag changes or at end, make a route request for this segment
    if(curNoHwy!==nextNoHwy || i===stops.length-2){
      const segEnd=i+1;
      const seg=stops.slice(segStart,segEnd+1);
      if(seg.length>=2){
        const origin={lat:seg[0].lat,lng:seg[0].lng};
        const dest={lat:seg[seg.length-1].lat,lng:seg[seg.length-1].lng};
        const waypoints=seg.slice(1,-1).map(s=>({location:{lat:s.lat,lng:s.lng},stopover:true}));
        const req={origin,destination:dest,waypoints,travelMode:'DRIVING'};
        if(curNoHwy)req.avoidHighways=true;
        ds.route(req,(result,status)=>{
          if(status==='OK'){
            const dr=new google.maps.DirectionsRenderer({map:map,
              suppressMarkers:true,preserveViewport:true,
              polylineOptions:{strokeColor:'#00d4ff',strokeWeight:3,strokeOpacity:0.6}});
            dr.setDirections(result);
            mPolylines.push(dr);
          }
        });
      }
      segStart=i+1;
    }
  }
}

function onGpsUpdate(p,announce_it){
  gLat=p.coords.latitude;gLng=p.coords.longitude;
  // Store heading (null when stationary)
  if(p.coords.heading!==null && !isNaN(p.coords.heading) && p.coords.speed>1){
    gHeading=p.coords.heading;
  }
  // Always move marker immediately (fast)
  moveMarker(gLat,gLng);
  // Throttle everything else to 5 seconds
  const now=Date.now();
  if(!announce_it && now-lastUpdate<5000){pendingPos=p;return;}
  lastUpdate=now;pendingPos=null;
  gSt='📍 追尾中 ('+gLat.toFixed(4)+', '+gLng.toFixed(4)+')'+(gHeading!==null?' 🧭'+Math.round(gHeading)+'°':'');
  const st=STOPS[cDay],ni=fN(st);
  // 500m以内に入ったら次のストップへ自動進行
  if(ni.d<0.5 && ni.i<st.length-1 && lastNI!==ni.i+1){
    lastNI=ni.i+1;
    sNext();
    const nw=new Date(),nm=nw.getHours()*60+nw.getMinutes();
    ann(st,{i:lastNI,d:ni.d},nm-pT(st[lastNI].time));
    updateMap(gLat,gLng,st,lastNI);
    rnd();
    return;
  }
  rnd();
  if(announce_it || lastNI===-1){
    updateMap(gLat,gLng,st,ni.i);
    sGps();
    const nw=new Date(),nm=nw.getHours()*60+nw.getMinutes();
    ann(st,ni,nm-pT(st[ni.i].time));
    lastNI=ni.i;
  }
}

    if(!ov){ov=document.createElement('div');ov.id='mapOv';ov.className='map-overlay';mw.style.position='relative';mw.appendChild(ov);}
    ov.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div class="nm">${cS.name}</div>
        <div style="display:flex;gap:6px;">
          <button onclick="${watchId?'stopWatch()':'loc()'};event.stopPropagation();" style="background:none;border:1px solid ${watchId?'var(--grn)':'var(--bdr)'};border-radius:8px;color:${watchId?'var(--grn)':'var(--sub)'};font-size:18px;padding:4px 8px;cursor:pointer;">📍</button>
          <button onclick="iM=!iM;rnd();event.stopPropagation();" style="background:none;border:1px solid var(--bdr);border-radius:8px;color:${iM?'var(--sub)':'var(--ac)'};font-size:18px;padding:4px 8px;cursor:pointer;">${iM?'🔇':'🔊'}</button>
          <button onclick="toggleNight();event.stopPropagation();" style="background:none;border:1px solid var(--bdr);border-radius:8px;color:${nightMode?'var(--ylw)':'var(--sub)'};font-size:18px;padding:4px 8px;cursor:pointer;">${nightMode?'🌙':'☀️'}</button>
        </div>
      </div>
      <div class="inf"><div>${gLat?dispDist.toFixed(1):'--'}km<span>距離</span></div><div>${cS.time}<span>予定</span></div><div>${gLat?eH+':'+eM:'--:--'}<span>${rally?'到着予想':'予定時刻'}</span></div>${cS.pt?'<div style="color:var(--grn)">+'+cS.pt+'pt<span>獲得</span></div>':''}</div>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <button onclick="setZoomMode(0);event.stopPropagation();" style="flex:1;background:${zoomMode===0?'var(--ac)':'none'};border:1px solid ${zoomMode===0?'var(--ac)':'var(--bdr)'};border-radius:8px;color:${zoomMode===0?'#000':'var(--sub)'};padding:6px 4px;font-size:16px;cursor:pointer;">🔍</button>
        <button onclick="setZoomMode(1);event.stopPropagation();" style="flex:1;background:${zoomMode===1?'var(--ac)':'none'};border:1px solid ${zoomMode===1?'var(--ac)':'var(--bdr)'};border-radius:8px;color:${zoomMode===1?'#000':'var(--sub)'};padding:6px 4px;font-size:16px;cursor:pointer;">📍</button>
        <button onclick="setZoomMode(2);event.stopPropagation();" style="flex:1;background:${zoomMode===2?'var(--ac)':'none'};border:1px solid ${zoomMode===2?'var(--ac)':'var(--bdr)'};border-radius:8px;color:${zoomMode===2?'#000':'var(--sub)'};padding:6px 4px;font-size:16px;cursor:pointer;">🗺️</button>
      </div>`;
    if(map)google.maps.event.trigger(map,'resize');
  } else {
    mw.className='';
    mw.style.display='none';
    document.getElementById('top').style.display='block';
    const ov=document.getElementById('mapOv');if(ov)ov.remove();
  }

  // Top: Panel1 (past) + Panel2 (current)
  let t='';
  // Past
  t+=`<div class="pnl pp"><div class="ph">✅ 通過済み（${gLat?nI:0}件）</div>`;
  if(gLat&&nI>0){for(let i=nI-1;i>=Math.max(0,nI-8);i--)t+=`<div class="pi"><div class="d"></div><span>${st[i].name}</span>${st[i].pt?'<span class="p">+'+st[i].pt+'</span>':''}<span class="t">${st[i].time}</span></div>`;}
  else t+=`<div class="pi" style="color:#333">まだありません</div>`;
  t+=`</div>`;
  // Current
  t+=`<div class="pnl pc"><div class="lb">▶ いま向かっている場所</div>
    <div class="nm">${cS.name}</div>${cS.memo?'<div class="mm">'+cS.memo+'</div>':''}
    <div class="sts"><div class="st"><div class="v">${gLat?dispDist.toFixed(1):'--'}</div><div class="l">km先</div></div>
    <div class="st"><div class="v">${cS.time}</div><div class="l">予定</div></div>
    <div class="st"><div class="v">${gLat?eH+':'+eM:'--:--'}</div><div class="l">${rally?'到着予想':'予定時刻'}</div></div></div>
    ${cS.pt?'<div class="pb"><div class="ptb">+'+cS.pt+'pt</div></div>':''}
  </div>`;
  document.getElementById('top').innerHTML=t;

  // Bottom: Panel3 (next) + points + controls + list
  let b='';
  if(vM==='list'){
    if(xI!==cI)b+=`<div class="pnl pn"><div class="ar">›</div><div><div class="lb">その次</div><div class="nm">${xS.name}</div><div class="dt">${xS.time}${gLat?' ・ 約'+xD.toFixed(0)+'km':''}${xS.pt?' ・ +'+xS.pt+'pt':''}</div></div></div>`;
    if(cDay==='day1'){const pc=Math.min(100,Math.round(pPt/15*100));b+=`<div class="ptbar"><div><div class="tot">${pPt}</div><div class="lb">獲得pt</div></div><div class="prg"><div class="pf" style="width:${pc}%"></div></div><div style="text-align:right"><div class="tot" style="font-size:16px">${tPt}</div><div class="lb">MAX</div></div></div>`;}
    b+=`<div class="ctrls">
      <button class="cb pri" onclick="${watchId?'stopWatch()':'loc()'}">📍 ${watchId?'追尾中…⏹':'現在地'}</button>
      <button class="cb ${iM?'':'act'}" onclick="iM=!iM;rnd();">${iM?'🔇':'🔊'}</button>
      <label class="cb" style="border-color:var(--pk);color:var(--pk);">🎵 BGM<input type="file" accept="audio/*" onchange="lBGM(event)" style="display:none;"></label>
      <button class="cb ${sFl?'act':''}" onclick="sFl=!sFl;rnd();">📋 全リスト</button>
    </div>
    <div id="bi" style="display:${bgm?'block':'none'};text-align:center;font-size:11px;color:var(--pk);padding:2px;"></div>
    <div class="gps">${gSt}</div>
    <div class="dtabs"><div class="dtab ${cDay==='day1'?'act':''}" onclick="cDay='day1';rnd();">Day1 (5/23)</div><div class="dtab ${cDay==='day2'?'act':''}" onclick="cDay='day2';rnd();">Day2 (5/24)</div></div>`;
    b+=`<div class="fl ${sFl?'show':''}"><div class="fh">📋 全ストップ</div>`;
    st.forEach((s,i)=>{let c=gLat?(i<nI?'pst':i===nI?'cur':''):'';b+=`<div class="fi ${c}"><div class="dot ${tc[s.type]||'dv'}"></div><span class="nm">${s.name}</span>${s.pt?'<span class="pt">+'+s.pt+'</span>':''}<span class="tm">${s.time}</span></div>`;});
    b+=`</div>`;
  } else {
    // 地図タブ: GPSステータスのみ
    b+=`<div class="gps">${gSt}</div>`;
  }
  document.getElementById('btm').innerHTML=b;
}
setInterval(rnd,1000);
// Auto detect Day1 (5/23) or Day2 (5/24)
(function(){
  const now=new Date();
  const m=now.getMonth()+1,d=now.getDate();
  if(m===5&&d===24)cDay='day2';
  else cDay='day1'; // Default day1 (including 5/23 and testing)
})();
rnd();
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='activated'){
          // 新バージョンが有効化されたら自動リロード
          window.location.reload();
        }
      });
    });
  });
  // 既存のSWが更新を持っている場合
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    window.location.reload();
  });
}
function goHome(){
  if(watchId){navigator.geolocation.clearWatch(watchId);watchId=null;}
  speechSynthesis.cancel();
  if(appBgm){appBgm.pause();appBgm=null;}
  location.reload();
}
function startApp(mode){
  const sp=document.getElementById('splash');
  if(!sp)return;
  aC.resume();
  sp.remove();
  playAppBgm();

  const titles={sstr:'SSTR 2026',nippon1:'にっぽん応援ツーリング 2026 ①',nippon2:'にっぽん応援ツーリング 2026 ②'};
  const title=titles[mode]||'SSTR 2026';

  // 中間画面
  const mid=document.createElement('div');
  mid.style.cssText='position:fixed;inset:0;background:#06060c;z-index:9998;';
  mid.innerHTML=`
    <div style="position:absolute;inset:0;background-image:url(bg2.jpg);background-size:cover;background-position:center 70%;"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,6,12,0.0) 0%,rgba(6,6,12,0.2) 100%);"></div>
    <div style="position:absolute;top:20px;right:20px;z-index:2;font-family:'Outfit';font-size:12px;color:#fff;letter-spacing:1px;">v.260405130.648792a</div>
    <div style="position:absolute;top:40%;left:0;right:0;z-index:1;text-align:center;padding:0 24px;">
      <div style="font-family:'Outfit';font-size:26px;font-weight:900;color:#00d4ff;margin-bottom:4px;">${title}</div>
      <div style="font-size:13px;color:#ccc;margin-bottom:20px;">が選択されました</div>
      <div style="display:inline-flex;align-items:center;gap:10px;">
        <div style="width:8px;height:8px;border-radius:50%;background:#00d4ff;animation:pulse 1s infinite;flex-shrink:0;"></div>
        <div style="font-size:13px;color:#00d4ff;">GPS情報取得までお待ちください</div>
      </div>
    </div>
    <style>@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}</style>
  `;
  document.body.appendChild(mid);

  function fadeBgm(){try{if(appBgm){let v=appBgm.volume;const f=setInterval(()=>{v=Math.max(0,v-0.05);appBgm.volume=v;if(v<=0){stopAppBgm();clearInterval(f);}},80);}}catch(e){}}

  // TTS読み上げ
  setTimeout(()=>{
    if(!iM&&'speechSynthesis'in window){
      const u=new SpeechSynthesisUtterance(title+'が選択されました。GPS情報取得までお待ちください。');
      u.lang='ja-JP';u.rate=1.1;
      speechSynthesis.speak(u);
    }
  },500);

  // 8秒後に確実に遷移（GPS待ちなし）
  setTimeout(()=>{fadeBgm();if(mid.parentNode)mid.remove();},8000);

  if(mode==='nippon1'||mode==='nippon2'){
    setTimeout(()=>{if(mid.parentNode)mid.remove();
      document.getElementById('hdr-area').innerHTML=`<div class="hdr"><div><h1>🇯🇵 にっぽん応援ツーリング</h1></div></div>`;
      document.getElementById('top').innerHTML=`<div style="text-align:center;padding:60px 20px;color:#666680;font-size:14px;">ルートデータ準備中です<br>もうしばらくお待ちください 🙏</div>`;
    },3000);
    return;
  }

  loc();
}
</script>
</body>
</html>
