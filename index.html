body{font-family:'Noto Sans JP','Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-user-select:none;user-select:none;}

function pT(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
// Check if today is the actual rally day for the selected day
function isRallyDay(){
  const now=new Date(),m=now.getMonth()+1,d=now.getDate();
  if(cDay==='day1')return m===5&&d===23;
  if(cDay==='day2')return m===5&&d===24;
  return false;
}
function fD(m){const a=Math.abs(m),h=Math.floor(a/60),n=a%60;return h>0?h+'h'+n.toString().padStart(2,'0')+'m':n+'m';}
function dK(a,b,c,d){const R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z));}

let cDay='day1',gLat=null,gLng=null,gSt='',sFl=false,iM=false,bgm=null,vM='list';

// === VIEW TOGGLE ===
function setView(mode){
  vM=mode;lastRouteNI=-1;
  if(mode==='map'){
    initMap();
    const mw=document.getElementById('mapWrap');
    mw.style.display='block';
    mw.className='full';
    const st=STOPS[cDay];
    if(gLat){
      const ni=fN(st);
      updateMap(gLat,gLng,st,ni.i);
    } else {
      showRouteOnly(st);
    }
  } else {
    document.getElementById('mapWrap').style.display='none';
  }
  rnd();
}

function showRouteOnly(stops){
  initMap();
  document.getElementById('mapWrap').style.display='block';
  clearMap();
  const cols={noto:'#4caf50',michi:'#2196f3',goal:'#ff9100',qk:'#ff9100',gs:'#e85300',move:'#666',other:'#9e9e9e'};
  const bounds=new google.maps.LatLngBounds();
  stops.forEach((s,i)=>{
    const c=cols[s.type]||'#666';
    const mk=new google.maps.Marker({position:{lat:s.lat,lng:s.lng},map:map,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:5,fillColor:c,fillOpacity:1,strokeColor:'#fff',strokeWeight:1},
      title:s.name});
    mk.addListener('click',()=>{new google.maps.InfoWindow({content:s.name+'<br>'+s.time}).open(map,mk);});
    mStops.push(mk);
    bounds.extend({lat:s.lat,lng:s.lng});
  });
  // Draw route via Directions API
  fetchGoogleRoute(stops);
  map.fitBounds(bounds,{top:40,bottom:40,left:40,right:40});
}

// Google Directions route
let mDirectionsRenderer=null;
let mPolylines=[];
function clearMap(){
  if(mMe){mMe.setMap(null);mMe=null;}
  if(mTgt){mTgt.setMap(null);mTgt=null;}
  mStops.forEach(m=>m.setMap(null));mStops=[];
  if(mDirectionsRenderer){mDirectionsRenderer.setMap(null);mDirectionsRenderer=null;}
  mPolylines.forEach(p=>p.setMap(null));mPolylines=[];
}
function fetchGoogleRoute(stops){
  if(stops.length<2)return;
  const ds=new google.maps.DirectionsService();
  // Split into noHwy and highway segments
  let segStart=0;
  for(let i=0;i<stops.length-1;i++){
    const curNoHwy=!!stops[i].noHwy;
    const nextNoHwy=!!stops[i+1].noHwy;
    // When noHwy flag changes or at end, make a route request for this segment
    if(curNoHwy!==nextNoHwy || i===stops.length-2){
      const segEnd=i+1;
      const seg=stops.slice(segStart,segEnd+1);
      if(seg.length>=2){
        const origin={lat:seg[0].lat,lng:seg[0].lng};
        const dest={lat:seg[seg.length-1].lat,lng:seg[seg.length-1].lng};
        const waypoints=seg.slice(1,-1).map(s=>({location:{lat:s.lat,lng:s.lng},stopover:true}));
        const req={origin,destination:dest,waypoints,travelMode:'DRIVING'};
        if(curNoHwy)req.avoidHighways=true;
        ds.route(req,(result,status)=>{
          if(status==='OK'){
            const dr=new google.maps.DirectionsRenderer({map:map,
              suppressMarkers:true,preserveViewport:true,
              polylineOptions:{strokeColor:'#00d4ff',strokeWeight:3,strokeOpacity:0.6}});
            dr.setDirections(result);
            mPolylines.push(dr);
          }
        });
      }
      segStart=i+1;
    }
  }
}

// === MAP ===
let map=null,mMe=null,mTgt=null,mStops=[];
function initMap(){
  if(map)return;
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:35.69,lng:139.84},zoom:16,maxZoom:22,
    disableDefaultUI:true,zoomControl:true,
    styles:[{featureType:'poi',stylers:[{visibility:'off'}]}]
  });
}
let lastRouteNI=-1;
function updateMap(lat,lng,stops,nI){
  initMap();
  if(vM!=='map'){document.getElementById('mapWrap').style.display='none';return;}
  document.getElementById('mapWrap').style.display='block';
  // Update my position marker
  if(!mMe){
    mMe=new google.maps.Marker({map:map,zIndex:100,
      icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:7,
        fillColor:'#00d4ff',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,
        rotation:gHeading||0}});
  }
  mMe.setPosition({lat,lng});
  if(gHeading!==null){
    mMe.setIcon({path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:7,
      fillColor:'#00d4ff',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,
      rotation:gHeading});
  }
  const tI=Math.min(nI+1,stops.length-1),tS=stops[tI];
  // Rebuild when nearest stop changes
  if(nI!==lastRouteNI){
    lastRouteNI=nI;
    if(mTgt){mTgt.setMap(null);}
    mStops.forEach(m=>m.setMap(null));mStops=[];
    mPolylines.forEach(p=>{if(p.setMap)p.setMap(null);});mPolylines=[];
    // Next stop marker
    mTgt=new google.maps.Marker({position:{lat:tS.lat,lng:tS.lng},map:map,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,
        fillColor:'#ff9100',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
      title:tS.name});
    // Google Directions: current pos → next stop (road-following route!)
    const ds=new google.maps.DirectionsService();
    const curStop=stops[nI];
    const dReq={origin:{lat,lng},destination:{lat:tS.lat,lng:tS.lng},travelMode:'DRIVING'};
    if(curStop.noHwy)dReq.avoidHighways=true;
    ds.route(dReq,
      (result,status)=>{
        if(status==='OK'){
          const dr=new google.maps.DirectionsRenderer({map:map,
            suppressMarkers:true,preserveViewport:true,
            polylineOptions:{strokeColor:'#00d4ff',strokeWeight:4,strokeOpacity:0.8}});
          dr.setDirections(result);
          mPolylines.push(dr);
        }
      });
    // Remaining stops markers
    if(vM==='map'){
      const cols={noto:'#4caf50',michi:'#2196f3',goal:'#ff9100',qk:'#ff9100',gs:'#e85300',move:'#666',other:'#9e9e9e'};
      stops.forEach((s,i)=>{
        if(i===tI)return;
        const c=cols[s.type]||'#666',op=i<nI?0.3:0.8;
        const mk=new google.maps.Marker({position:{lat:s.lat,lng:s.lng},map:map,opacity:op,
          icon:{path:google.maps.SymbolPath.CIRCLE,scale:i<nI?4:5,
            fillColor:c,fillOpacity:1,strokeColor:'#fff',strokeWeight:1}});
        mStops.push(mk);
      });
    }
  }
  // Always center on user
  const tDist=dK(lat,lng,tS.lat,tS.lng);
  let zoom=22;
  if(tDist>50)zoom=14;else if(tDist>30)zoom=15;else if(tDist>15)zoom=16;else if(tDist>5)zoom=17;else if(tDist>1)zoom=18;else if(tDist>0.3)zoom=20;
  map.setCenter({lat,lng});map.setZoom(zoom);
}

// === AUDIO ===
const aC=new(window.AudioContext||window.webkitAudioContext)();
function tn(f,d,t,dl){if(iM)return;const o=aC.createOscillator(),g=aC.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.25,aC.currentTime+dl);g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+dl+d);o.connect(g);g.connect(aC.destination);o.start(aC.currentTime+dl);o.stop(aC.currentTime+dl+d);}
function sGps(){tn(880,.1,'sine',0);tn(1100,.12,'sine',.08);}
function sAhd(){tn(523,.12,'sine',0);tn(659,.12,'sine',.1);tn(784,.15,'sine',.2);}
function sBhd(){tn(400,.15,'square',0);tn(350,.15,'square',.12);tn(300,.2,'square',.24);}
function sOnt(){tn(700,.12,'sine',0);tn(700,.12,'sine',.15);}
function sGoal(){tn(523,.15,'sine',0);tn(659,.15,'sine',.12);tn(784,.15,'sine',.24);tn(1047,.3,'sine',.36);tn(784,.1,'sine',.56);tn(1047,.4,'sine',.66);}
function lBGM(e){const f=e.target.files[0];if(!f)return;if(bgm)bgm.pause();bgm=new Audio(URL.createObjectURL(f));bgm.volume=0.5;bgm.play();document.getElementById('bi').textContent='🎵 '+f.name;document.getElementById('bi').style.display='block';}
function spk(t){if(iM)return;if('speechSynthesis'in window){speechSynthesis.cancel();if(bgm&&!bgm.paused)bgm.volume=0.1;const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=1.1;u.onend=()=>{if(bgm)bgm.volume=0.5;};speechSynthesis.speak(u);}}
// Optimized: only search ±3 stops from last known position (100km/h × 5s = 140m max)
function fN(stops){
  if(!gLat)return{i:0,d:0};
  const start=Math.max(0,(lastNI>0?lastNI-2:0));
  const end=Math.min(stops.length,(lastNI>=0?lastNI+4:stops.length));
  let m=Infinity,x=lastNI>=0?lastNI:0;
  for(let i=start;i<end;i++){const d=dK(gLat,gLng,stops[i].lat,stops[i].lng);if(d<m){m=d;x=i;}}
  return{i:x,d:m};
}
function ann(stops,ni,df){
  const s=stops[ni.i];
  const rally=isRallyDay();
  if(s.name.includes('GOAL')&&ni.d<2){sGoal();if(bgm)bgm.volume=0.8;}
  else if(!rally)sOnt();
  else if(Math.abs(df)<=5)sOnt();else if(df<0)sAhd();else sBhd();
  let m='';
  if(rally){
    if(Math.abs(df)<=5)m='ほぼ予定通りです。';
    else if(df<0)m='予定より'+Math.abs(df)+'分早いです。';
    else{m='予定より'+df+'分遅れています。';if(df>30)m+='巻いていきましょう！';}
  }
  if(ni.i<stops.length-1){const nx=stops[ni.i+1],nd=dK(gLat,gLng,nx.lat,nx.lng),nm=nx.name.replace(/[^\w\s\u3000-\u9FFF\u30A0-\u30FF\u3040-\u309F]/g,'').trim();m+='次は、'+nm+'。約'+Math.round(nd)+'キロ先です。';}
  setTimeout(()=>spk(m),1000);
}
let watchId=null;
let lastNI=-1;
let lastUpdate=0;
let pendingPos=null;
let gHeading=null; // GPS heading for map rotation
let hMode=true; // heading mode on by default

// Fast: just move the marker without rebuilding everything
function moveMarker(lat,lng){
  if(mMe){
    mMe.setPosition({lat,lng});
    if(gHeading!==null){
      mMe.setIcon({path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:7,
        fillColor:'#00d4ff',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,
        rotation:gHeading});
    }
  }
  if(map)map.panTo({lat,lng});
}

function onGpsUpdate(p,announce_it){
  gLat=p.coords.latitude;gLng=p.coords.longitude;
  // Store heading (null when stationary)
  if(p.coords.heading!==null && !isNaN(p.coords.heading) && p.coords.speed>1){
    gHeading=p.coords.heading;
  }
  // Always move marker immediately (fast)
  moveMarker(gLat,gLng);
  // Throttle everything else to 5 seconds
  const now=Date.now();
  if(!announce_it && now-lastUpdate<5000){pendingPos=p;return;}
  lastUpdate=now;pendingPos=null;
  gSt='📍 追尾中 ('+gLat.toFixed(4)+', '+gLng.toFixed(4)+')'+(gHeading!==null?' 🧭'+Math.round(gHeading)+'°':'');
  const st=STOPS[cDay],ni=fN(st);
  rnd();
  // Only full map update when nearest stop changes or first time
  if(announce_it || lastNI===-1 || ni.i!==lastNI){
    updateMap(gLat,gLng,st,ni.i);
    if(announce_it || (lastNI!==-1 && ni.i!==lastNI)){
      sGps();
      const nw=new Date(),nm=nw.getHours()*60+nw.getMinutes();
      ann(st,ni,nm-pT(st[ni.i].time));
    }
    lastNI=ni.i;
  }
}
// Process any pending position every 5s
setInterval(()=>{if(pendingPos){onGpsUpdate(pendingPos,false);pendingPos=null;}},5000);

function loc(){
  if(!navigator.geolocation){gSt='❌ GPS非対応';rnd();return;}
  gSt='📡 取得中...';rnd();
  // First: get immediate position with announcement
  navigator.geolocation.getCurrentPosition(p=>{
    onGpsUpdate(p,true);
  },e=>{
    const msgs={1:'❌ 位置情報を許可してください',2:'❌ 位置取得できません',3:'❌ タイムアウト'};
    gSt=msgs[e.code]||'❌ '+e.message;
    rnd();
  },{enableHighAccuracy:true,timeout:15000});
  // Then: start continuous watch (silent updates)
  if(watchId)navigator.geolocation.clearWatch(watchId);
  watchId=navigator.geolocation.watchPosition(p=>{
    onGpsUpdate(p,false);
  },()=>{},{enableHighAccuracy:true,maximumAge:3000,timeout:10000});
}

function stopWatch(){
  if(watchId){navigator.geolocation.clearWatch(watchId);watchId=null;}
  gSt='⏹ 追尾停止';rnd();
}

// Test: jump to a stop location for PC testing
let testIdx=0;
function testJump(){
  const st=STOPS[cDay];
  testIdx=(testIdx+1)%st.length;
  gLat=st[testIdx].lat+(Math.random()-0.5)*0.01;
  gLng=st[testIdx].lng+(Math.random()-0.5)*0.01;
  gSt='🧪 テスト: '+st[testIdx].name;
  rnd();sGps();
  const ni=fN(st),nw=new Date(),nm=nw.getHours()*60+nw.getMinutes();
  ann(st,ni,nm-pT(st[ni.i].time));
  if(vM==='map')updateMap(gLat,gLng,st,ni.i);
}

// === RENDER (split: hdr-area, top, btm) ===
function rnd(){
  const st=STOPS[cDay],nw=new Date();
  const nH=nw.getHours().toString().padStart(2,'0'),nM=nw.getMinutes().toString().padStart(2,'0');
  const nwM=nw.getHours()*60+nw.getMinutes();
  const ni=fN(st),nI=gLat?ni.i:0,nD=gLat?ni.d:0;
  const pl=pT(st[nI].time),df=gLat&&isRallyDay()?(nwM-pl):0;
  const rally=isRallyDay();
  let dc=!rally?'ot':Math.abs(df)<=5?'ot':df<0?'ah':'bh';
  let dt=!rally?'テスト':Math.abs(df)<=5?'±0':((df>0?'+':'-')+fD(df));
  if(!gLat){dc='ot';dt='--';}
  let cI=gLat?(nD<1?nI:Math.min(nI+1,st.length-1)):0;
  const cS=st[cI],cD=gLat?dK(gLat,gLng,cS.lat,cS.lng):0;
  const cP=pT(cS.time),eta=gLat&&rally?cP+df:cP;
  const eH=Math.floor(((eta%1440)+1440)%1440/60).toString().padStart(2,'0'),eM=(((eta%1440)+1440)%1440%60).toString().padStart(2,'0');
  const xI=Math.min(cI+1,st.length-1),xS=st[xI],xD=gLat?dK(gLat,gLng,xS.lat,xS.lng):0;
  let pPt=0;st.forEach((s,i)=>{if(gLat&&i<nI)pPt+=s.pt;});
  let tPt=0;st.forEach(s=>tPt+=s.pt);
  const tc={move:'dv',michi:'dm',noto:'dn',goal:'dg',qk:'dq',gs:'ds',other:'do'};

  // Header
  document.getElementById('hdr-area').innerHTML=`<div class="hdr">
    <div><h1>SSTR 🏍️</h1><span class="bdg ${dc}">${dt}</span></div>
    <div style="text-align:right"><div class="now">${nH}:${nM}</div><div class="date">${nw.getMonth()+1}/${nw.getDate()} ${['日','月','火','水','木','金','土'][nw.getDay()]}</div></div>
  </div>
  <div class="vtabs">
    <div class="vtab ${vM==='list'?'act':''}" onclick="setView('list')">📋 リスト</div>
    <div class="vtab ${vM==='map'?'act':''}" onclick="setView('map')">🗺️ 地図</div>
  </div>`;

  // Map mode toggle
  const mw=document.getElementById('mapWrap');
  if(vM==='map'){
    mw.style.display='block';
    mw.className='full';
    document.getElementById('top').style.display='none';
    // Overlay on map
    let ov=document.getElementById('mapOv');
    if(!ov){ov=document.createElement('div');ov.id='mapOv';ov.className='map-overlay';mw.style.position='relative';mw.appendChild(ov);}
    ov.innerHTML=`<div class="nm">${cS.name}</div>
      ${cS.memo?'<div class="mm">'+cS.memo+'</div>':''}
      <div class="inf"><div>${gLat?cD.toFixed(1):'--'}km<span>距離</span></div><div>${cS.time}<span>予定</span></div><div>${gLat?eH+':'+eM:'--:--'}<span>${rally?'到着予想':'予定時刻'}</span></div>${cS.pt?'<div style="color:var(--grn)">+'+cS.pt+'pt<span>獲得</span></div>':''}</div>`;
    if(map)google.maps.event.trigger(map,'resize');
  } else {
    mw.className='';
    mw.style.display='none';
    document.getElementById('top').style.display='block';
    const ov=document.getElementById('mapOv');if(ov)ov.remove();
  }

  // Top: Panel1 (past) + Panel2 (current)
  let t='';
  // Past
  t+=`<div class="pnl pp"><div class="ph">✅ 通過済み（${gLat?nI:0}件）</div>`;
  if(gLat&&nI>0){for(let i=nI-1;i>=Math.max(0,nI-8);i--)t+=`<div class="pi"><div class="d"></div><span>${st[i].name}</span>${st[i].pt?'<span class="p">+'+st[i].pt+'</span>':''}<span class="t">${st[i].time}</span></div>`;}
  else t+=`<div class="pi" style="color:#333">まだありません</div>`;
  t+=`</div>`;
  // Current
  t+=`<div class="pnl pc"><div class="lb">▶ いま向かっている場所</div>
    <div class="nm">${cS.name}</div>${cS.memo?'<div class="mm">'+cS.memo+'</div>':''}
    <div class="sts"><div class="st"><div class="v">${gLat?cD.toFixed(1):'--'}</div><div class="l">km先</div></div>
    <div class="st"><div class="v">${cS.time}</div><div class="l">予定</div></div>
    <div class="st"><div class="v">${gLat?eH+':'+eM:'--:--'}</div><div class="l">${rally?'到着予想':'予定時刻'}</div></div></div>
    ${cS.pt?'<div class="pb"><div class="ptb">+'+cS.pt+'pt</div></div>':''}
  </div>`;
  document.getElementById('top').innerHTML=t;

  // Bottom: Panel3 (next) + points + controls + list
  let b='';
  if(vM==='list'){
    if(xI!==cI)b+=`<div class="pnl pn"><div class="ar">›</div><div><div class="lb">その次</div><div class="nm">${xS.name}</div><div class="dt">${xS.time}${gLat?' ・ 約'+xD.toFixed(0)+'km':''}${xS.pt?' ・ +'+xS.pt+'pt':''}</div></div></div>`;
    if(cDay==='day1'){const pc=Math.min(100,Math.round(pPt/15*100));b+=`<div class="ptbar"><div><div class="tot">${pPt}</div><div class="lb">獲得pt</div></div><div class="prg"><div class="pf" style="width:${pc}%"></div></div><div style="text-align:right"><div class="tot" style="font-size:16px">${tPt}</div><div class="lb">MAX</div></div></div>`;}
  }
  b+=`<div class="ctrls">
    <button class="cb pri" onclick="${watchId?'stopWatch()':'loc()'}">📍 ${watchId?'追尾中…⏹':'現在地'}</button>
    <button class="cb ${iM?'':'act'}" onclick="iM=!iM;rnd();">${iM?'🔇':'🔊'}</button>
    <label class="cb" style="border-color:var(--pk);color:var(--pk);">🎵 BGM<input type="file" accept="audio/*" onchange="lBGM(event)" style="display:none;"></label>
    <button class="cb ${sFl?'act':''}" onclick="sFl=!sFl;rnd();">📋 全リスト</button>
    <button class="cb" onclick="testJump()" style="border-color:#666;color:#666;">🧪 テスト</button>
  </div>
  <div id="bi" style="display:${bgm?'block':'none'};text-align:center;font-size:11px;color:var(--pk);padding:2px;"></div>
  <div class="gps">${gSt}</div>
  <div class="dtabs"><div class="dtab ${cDay==='day1'?'act':''}" onclick="cDay='day1';rnd();">Day1 (5/23)</div><div class="dtab ${cDay==='day2'?'act':''}" onclick="cDay='day2';rnd();">Day2 (5/24)</div></div>`;
  if(vM==='list'){
    b+=`<div class="fl ${sFl?'show':''}"><div class="fh">📋 全ストップ</div>`;
    st.forEach((s,i)=>{let c=gLat?(i<nI?'pst':i===nI?'cur':''):'';b+=`<div class="fi ${c}"><div class="dot ${tc[s.type]||'dv'}"></div><span class="nm">${s.name}</span>${s.pt?'<span class="pt">+'+s.pt+'</span>':''}<span class="tm">${s.time}</span></div>`;});
    b+=`</div>`;
  }
  document.getElementById('btm').innerHTML=b;
}
setInterval(rnd,30000);
// Auto detect Day1 (5/23) or Day2 (5/24)
(function(){
  const now=new Date();
  const m=now.getMonth()+1,d=now.getDate();
  if(m===5&&d===24)cDay='day2';
  else cDay='day1'; // Default day1 (including 5/23 and testing)
})();
rnd();
// Auto start GPS tracking on load
setTimeout(loc,500);
</script>
