global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: '${GMAIL_USER}'
  smtp_auth_username: '${GMAIL_USER}'
  smtp_auth_password: '${GMAIL_APP_PW}'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'gmail'

receivers:
  - name: 'gmail'
    email_configs:
      - to: '${GMAIL_USER}'
        send_resolved: true
        headers:
          Subject: '[Grafana] {{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
