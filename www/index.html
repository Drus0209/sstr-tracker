<style>
:root{--bg:#06060c;--card:#111118;--bdr:#1e1e2e;--txt:#e8e8f0;--sub:#666680;--ac:#00d4ff;--grn:#00e676;--red:#ff4444;--org:#ff9100;--ylw:#ffd740;--pk:#ff6b9d;--noto:#4caf50;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP','Outfit',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;-webkit-user-select:none;user-select:none;}
#btm{overflow-y:auto;max-height:calc(100vh - 110px);}
#mapWrap{touch-action:none;}
.hdr{background:linear-gradient(135deg,#0a0a1a,#0f2040);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--ac);position:sticky;top:0;z-index:100;}
.hdr h1{font-family:'Outfit';font-size:16px;font-weight:900;color:var(--ac);letter-spacing:1px;}
.hdr .now{font-family:'Outfit';font-size:24px;font-weight:900;color:#fff;}
.hdr .date{font-size:10px;color:var(--txt);opacity:0.7;}
.bdg{display:inline-block;padding:4px 12px;border-radius:20px;font-size:14px;font-weight:800;font-family:'Outfit';}
.bdg.ah{background:#003320;color:var(--grn);border:1px solid #005530;}
.bdg.bh{background:#330011;color:var(--red);border:1px solid #550022;}
.bdg.ot{background:#332200;color:var(--ylw);border:1px solid #554400;}
.pnl{margin:6px 10px;border-radius:14px;overflow:hidden;}
.pp{background:var(--card);border:1px solid var(--bdr);max-height:110px;overflow-y:auto;}
.pp .ph{font-size:12px;color:var(--txt);letter-spacing:2px;padding:8px 12px 4px;position:sticky;top:0;background:var(--card);z-index:1;}
.pi{display:flex;align-items:center;padding:4px 12px;font-size:12px;color:var(--txt);border-bottom:1px solid #0e0e18;}
.pi .d{width:6px;height:6px;border-radius:50%;margin-right:8px;flex-shrink:0;background:var(--grn);}
.pi .p{color:var(--grn);margin-left:auto;font-weight:700;font-size:10px;padding-left:8px;}
.pi .t{color:var(--txt);margin-left:8px;font-family:'Outfit';font-size:11px;opacity:0.7;}
.pc{background:linear-gradient(135deg,#0a1a2a,#081428);border:2px solid var(--ac);padding:14px 16px;position:relative;overflow:hidden;}
.pc::before{content:'';position:absolute;top:-50%;right:-30%;width:200px;height:200px;background:radial-gradient(circle,rgba(0,212,255,0.08) 0%,transparent 70%);pointer-events:none;}
.pc .lb{font-size:11px;color:var(--ac);text-transform:uppercase;letter-spacing:3px;margin-bottom:6px;font-weight:700;}
.pc .nm{font-size:clamp(18px,5.5vw,32px);font-weight:900;line-height:1.2;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc .mm{font-size:14px;color:var(--org);margin-bottom:12px;}
.pc .sts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pc .st{text-align:center;background:rgba(0,0,0,0.3);border-radius:10px;padding:12px 10px;}
.pc .st .v{font-family:'Outfit';font-size:clamp(24px,8vw,42px);font-weight:900;color:var(--ac);white-space:nowrap;}
.pc .st .l{font-size:14px;color:var(--txt);letter-spacing:1px;margin-top:3px;font-weight:600;}
.pc .pb{display:flex;justify-content:center;margin-top:10px;}
.pc .ptb{background:#1a2a1a;border:1px solid var(--grn);color:var(--grn);padding:4px 16px;border-radius:20px;font-weight:800;font-family:'Outfit';font-size:16px;}
#mapWrap{display:none;margin:8px 10px;border-radius:14px;overflow:hidden;border:2px solid var(--bdr);position:relative;}
#map{height:80vh;width:100%;background:#e8e8e8;}
.pn{background:var(--card);border:1px solid var(--bdr);padding:14px 16px;display:flex;align-items:center;gap:12px;}
.pn .ar{font-size:28px;color:var(--txt);flex-shrink:0;}
.pn .lb{font-size:11px;color:var(--txt);letter-spacing:2px;margin-bottom:2px;}
.pn .nm{font-size:16px;font-weight:700;}
.pn .dt{font-size:12px;color:var(--txt);margin-top:2px;opacity:0.85;}
.ptbar{margin:8px 10px;padding:8px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;display:flex;align-items:center;justify-content:space-between;}
.ptbar .tot{font-family:'Outfit';font-size:24px;font-weight:900;color:var(--grn);}
.ptbar .lb{font-size:11px;color:var(--txt);}
.ptbar .prg{flex:1;margin:0 12px;height:6px;background:#1a1a2a;border-radius:3px;overflow:hidden;}
.ptbar .pf{height:100%;background:var(--grn);border-radius:3px;transition:width 0.5s;}
.ctrls{display:flex;gap:6px;margin:10px 10px;flex-wrap:wrap;justify-content:center;}
.cb{background:none;border:1px solid var(--bdr);color:var(--sub);padding:8px 14px;border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;}
.cb.pri{background:linear-gradient(135deg,var(--ac),#0088cc);border-color:var(--ac);color:#000;font-weight:800;font-size:14px;padding:10px 20px;}
.cb.act{border-color:var(--ac);color:var(--ac);}
.fl{margin:0 10px 10px;background:var(--card);border:1px solid var(--bdr);border-radius:14px;max-height:300px;overflow-y:auto;display:none;}
.fl.show{display:block;}
.fl .fh{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:2px;padding:10px 12px 6px;position:sticky;top:0;background:var(--card);z-index:1;}
.fi{display:flex;align-items:center;padding:6px 12px;font-size:12px;border-bottom:1px solid #0e0e18;background:var(--card);border-radius:8px;margin-bottom:4px;min-height:32px;}
.fi.pst{color:#2a2a3a;}.fi.pst .nm{color:#2a2a3a;}.fi.pst .tm{color:#1e2a33;}.fi.pst .dot{opacity:0.2;}.fi.pst .pt{color:#1a2a1a;}
.fi.cur{background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.3);}
.fi .dot{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0;}
.fi .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi .pt{color:var(--grn);font-weight:700;font-size:11px;margin-left:6px;}
.fi .tm{font-family:'Outfit';font-size:11px;color:var(--ac);margin-left:8px;line-height:1;flex-shrink:0;}
.dn{background:var(--noto);}.dm{background:#2196f3;}.dg{background:var(--org);}.dq{background:var(--org);}.ds{background:#e85300;}.dv{background:var(--sub);}.do{background:#9e9e9e;}
.gps{text-align:center;font-size:11px;color:var(--txt);padding:4px;opacity:0.7;}
.dtabs{display:flex;gap:6px;margin:8px 10px 0;}
.dtab{flex:1;padding:8px;text-align:center;border-radius:8px;background:var(--card);border:1px solid var(--bdr);font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;}
.dtab.act{border-color:var(--ac);color:var(--ac);}
.vtabs{display:flex;margin:6px 10px 0;background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--bdr);}
.vtab{flex:1;padding:10px;text-align:center;font-size:16px;font-weight:700;color:var(--txt);cursor:pointer;border:none;background:none;font-family:inherit;}
.vtab.act{background:rgba(0,212,255,0.1);color:var(--ac);}
#mapWrap.full{margin:8px 10px;}
#mapWrap.full #map{height:calc(100vh - 100px);min-height:500px;}
.map-overlay{position:absolute;top:10px;left:10px;right:10px;z-index:1000;background:rgba(8,20,40,0.92);border:1px solid var(--ac);border-radius:12px;padding:12px 14px;backdrop-filter:blur(2px);}
.map-overlay .nm{font-size:16px;font-weight:900;}
.map-overlay .mm{font-size:11px;color:var(--org);margin-top:2px;}
.map-overlay .inf{display:flex;gap:16px;margin-top:6px;font-family:'Outfit';font-size:14px;font-weight:800;color:var(--ac);}
.map-overlay .inf span{font-size:11px;color:var(--txt);font-weight:400;display:block;}
.sparkle{position:relative;overflow:hidden;}
.sparkle::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.3) 50%,transparent 70%);animation:sparkle 3s ease-in-out infinite;pointer-events:none;z-index:1;}
@keyframes sparkle{0%,100%{left:-100%;}50%{left:150%;}}
@keyframes orbisFlash{0%,100%{border-color:transparent;}50%{border-color:#ff4444;}}
@keyframes zundaBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
#riderNameInput::placeholder{color:rgba(255,255,255,0.5);}
#zundaOverlay{position:fixed;bottom:0;right:10px;z-index:10000;display:none;flex-direction:column;align-items:center;pointer-events:none;}
#zundaOverlay.show{display:flex;}
#zundaOverlay .bubble{background:rgba(134,193,102,0.95);color:#000;padding:10px 16px;border-radius:16px 16px 4px 16px;font-size:14px;font-weight:700;max-width:200px;margin-bottom:4px;text-align:center;}
#zundaOverlay .avatar-wrap{position:relative;width:100px;height:100px;animation:zundaBob 1s ease-in-out infinite;}
#zundaOverlay .avatar-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;}
</style>

function fD(m){const a=Math.abs(m),h=Math.floor(a/60),n=a%60;return h>0?h+'h'+n.toString().padStart(2,'0')+'m':n+'m';}
function dK(a,b,c,d){const R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z));}

function clearMap(){

var _turnPoints=[];// {lat,lng,dir:'右'|'左'|'斜め右'|'斜め左'|'Uターン',announced200:false,announced50:false}
function _drawRoute(result){
  const path=result.routes[0].overview_path;
  const pl=new google.maps.Polyline({
    path,map,strokeColor:'#00d4ff',strokeWeight:5,strokeOpacity:0.8
  });
  mPolylines.push(pl);
  // ステップからターン情報を抽出
  result.routes[0].legs.forEach(leg=>{
    leg.steps.forEach(step=>{
      if(!step.maneuver)return;
      var dir=null;
      if(step.maneuver==='turn-right')dir='右';
      else if(step.maneuver==='turn-left')dir='左';
      else if(step.maneuver==='turn-slight-right'||step.maneuver==='fork-right'||step.maneuver==='ramp-right')dir='斜め右';
      else if(step.maneuver==='turn-slight-left'||step.maneuver==='fork-left'||step.maneuver==='ramp-left')dir='斜め左';
      else if(step.maneuver==='turn-sharp-right')dir='鋭角右';
      else if(step.maneuver==='turn-sharp-left')dir='鋭角左';
      //else if(step.maneuver==='uturn-right'||step.maneuver==='uturn-left')dir='Uターン';
      if(dir){
        _turnPoints.push({lat:step.start_location.lat(),lng:step.start_location.lng(),dir:dir,announced200:false,announced50:false});
      }
    });
  });
}
function _routeReq(origin,dest,waypoints,noHwy){
  return{origin,destination:dest,waypoints:waypoints||[],
    travelMode:google.maps.TravelMode.DRIVING,
    avoidFerries:true,avoidHighways:false,avoidTolls:!!noHwy};
}
// Fallback: route each pair 1-to-1
function _route1to1(ds,chunk,delay){
  for(let k=0;k<chunk.length-1;k++){
    const a=chunk[k],b=chunk[k+1];
    setTimeout(()=>{
      const req=_routeReq({lat:a.lat,lng:a.lng},{lat:b.lat,lng:b.lng},[],a.noHwy||b.noHwy);
      console.log('[Route:1to1] '+a.name+' → '+b.name);
      _apiDir++;_apiSave();ds.route(req,(r,s)=>{
        if(s==='OK'){console.log('[Route:1to1] OK '+r.routes[0].legs[0].distance.text);_drawRoute(r);}
        else console.warn('[Route:1to1] FAILED '+s+': '+a.name+' → '+b.name);
      });
    },delay+k*500);
  }
}
function fetchGoogleRoute(stops){
  if(stops.length<2)return;
  // Step 1: split at noHwy boundary so highway/local don't mix
  const segs=[];let segStart=0;
  for(let i=1;i<stops.length;i++){
    if(!!stops[i].noHwy!==!!stops[segStart].noHwy){
      segs.push({stops:stops.slice(segStart,i+1),noHwy:!!stops[segStart].noHwy});
      segStart=i;
    }
  }
  if(segStart<stops.length-1)segs.push({stops:stops.slice(segStart),noHwy:!!stops[segStart].noHwy});
  // Step 2: chunk each segment (max 5 stops = 3 waypoints)
  const chunks=[];
  segs.forEach(seg=>{
    for(let i=0;i<seg.stops.length-1;i+=4){
      chunks.push({stops:seg.stops.slice(i,Math.min(i+5,seg.stops.length)),noHwy:seg.noHwy});
    }
  });
  console.log('[Route] segs='+segs.length+' chunks='+chunks.length+' stops='+stops.length);
  const ds=new google.maps.DirectionsService();
  chunks.forEach((ch,idx)=>{
    const s=ch.stops,oName=s[0].name,dName=s[s.length-1].name;
    setTimeout(()=>{
      const origin={lat:s[0].lat,lng:s[0].lng};
      const dest={lat:s[s.length-1].lat,lng:s[s.length-1].lng};
      const waypoints=s.slice(1,-1).map(p=>({location:{lat:p.lat,lng:p.lng},stopover:true}));
      console.log('[Route] chunk '+idx+'/'+chunks.length+': '+oName+' → '+dName+' (wp='+waypoints.length+', noHwy='+ch.noHwy+')');
      _apiDir++;_apiSave();ds.route(_routeReq(origin,dest,waypoints,ch.noHwy),(result,status)=>{
        if(status==='OK'){console.log('[Route] chunk '+idx+' OK');_drawRoute(result);}
        else{console.warn('[Route] chunk '+idx+' FAILED: '+status+', retrying 1-to-1');_route1to1(ds,s,0);}
      });
    },idx*500);
  });
}

let lastRouteNI=-1;
function updateMap(lat,lng,stops,nI){
  initMap();
  if(vM!=='map'){document.getElementById('mapWrap').style.display='none';return;}
  document.getElementById('mapWrap').style.display='block';
  // Update my position marker
  if(!mMe){
    mMe=new google.maps.Marker({map:map,zIndex:100,
      icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:7,
        fillColor:'#00d4ff',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,
        rotation:gHeading||0}});
  }
  mMe.setPosition({lat,lng});
  if(gHeading!==null){
    mMe.setIcon({path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:7,
      fillColor:'#00d4ff',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,
      rotation:gHeading});
  }
  const tI=nI,tS=stops[tI];
  // Rebuild when nearest stop changes
  if(nI!==lastRouteNI){
    lastRouteNI=nI;
    // Auto-zoom on stop change based on distance
    const tDist=dK(lat,lng,tS.lat,tS.lng);
    let zoom=18;
    if(tDist>50)zoom=13;else if(tDist>30)zoom=14;else if(tDist>15)zoom=15;else if(tDist>5)zoom=16;else if(tDist>1)zoom=17;else if(tDist>0.3)zoom=18;
    map.setZoom(zoom);
    if(mTgt){mTgt.setMap(null);}
    mStops.forEach(m=>m.setMap(null));mStops=[];
    mPolylines.forEach(p=>{if(p.setMap)p.setMap(null);});mPolylines=[];
    // Next stop marker
    mTgt=new google.maps.Marker({position:{lat:tS.lat,lng:tS.lng},map:map,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,
        fillColor:'#ff9100',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
      title:tS.name});
    // Current pos → next stop: road-following route
    const ds=new google.maps.DirectionsService();
    const curStop=stops[nI];
    _apiDir++;_apiSave();ds.route({origin:{lat,lng},destination:{lat:tS.lat,lng:tS.lng},
      travelMode:google.maps.TravelMode.DRIVING,
      avoidFerries:true,avoidHighways:false,avoidTolls:!!curStop.noHwy
    },(result,status)=>{
      if(status==='OK'){
        _drawRoute(result);
      }
    });
    // Full route: all stops
    fetchGoogleRoute(stops);
    // Remaining stops markers
    if(vM==='map'){
      const cols={noto:'#4caf50',michi:'#2196f3',goal:'#ff9100',qk:'#ff9100',gs:'#e85300',move:'#666',other:'#9e9e9e'};
      stops.forEach((s,i)=>{
        if(i===tI)return;
        const c=cols[s.type]||'#666',op=i<nI?0.3:0.8;
        const mk=new google.maps.Marker({position:{lat:s.lat,lng:s.lng},map:map,opacity:op,
          icon:{path:google.maps.SymbolPath.CIRCLE,scale:i<nI?4:5,
            fillColor:c,fillOpacity:1,strokeColor:'#fff',strokeWeight:1}});
        mStops.push(mk);
      });
    }
  }
  // Center on user only in street zoom mode
  if(zoomMode===0)map.panTo({lat,lng});
}

var _lastDistAnnounce=0;// 前回の定期案内時刻
var _lastDistKm=999;// 前回の10km刻み通過距離
var _announced2km=false;// 2km接近案内済みフラグ
function checkDistAnnounce(){
  if(!gLat||iM||lastNI<0)return;
  var st=STOPS[cDay];
  var idx=Math.max(0,lastNI);
  if(idx>=st.length)return;
  var d=roadDist!==null?roadDist:dK(gLat,gLng,st[idx].lat,st[idx].lng);
  var now=Date.now();

  // 1. 30分ごとの定期案内
  if(now-_lastDistAnnounce>=1800000&&_lastDistAnnounce>0){
    _lastDistAnnounce=now;
    if(d<1){var m=Math.round(d*1000/100)*100;spk('次の目的地は約'+m+'メートル先なのだ。');}
    else{spk('次の目的地は約'+d.toFixed(1)+'キロ先なのだ。');}
    return;
  }
  if(_lastDistAnnounce===0)_lastDistAnnounce=now;

  // 2. 10kmごとの案内（50km以上の場合のみ）
  if(d>=10){
    var km10=Math.floor(d/10)*10;
    if(km10<_lastDistKm&&_lastDistKm-km10>=10){
      _lastDistKm=km10;
      spk('次の目的地は約'+d.toFixed(1)+'キロ先なのだ。');
      return;
    }
  }
  if(d<_lastDistKm)_lastDistKm=Math.ceil(d/10)*10;

  // 3. 2km接近案内
  if(d<2&&d>=0.5&&!_announced2km){
    _announced2km=true;
    var nm=st[idx].name.replace(/[^\w\s\u3000-\u9FFF\u30A0-\u30FF\u3040-\u309F]/g,'').trim();
    spk('まもなく'+nm+'なのだ。',true);
    // チェックイン忘れ防止（復興ポイント・指定道の駅）
    if(st[idx].type==='noto'||st[idx].type==='michi')spk('公式アプリでチェックインも忘れずになのだ！',true);
    return;
  }
  if(d>=3)_announced2km=false;// リセット
}

function toggleRain(){
  if(!map)return;
  _rainOn=!_rainOn;
  if(_rainOn){
    _rainLayer=new google.maps.ImageMapType({
      getTileUrl:function(coord,zoom){
        return 'https://tile.openweathermap.org/map/precipitation_new/'+zoom+'/'+coord.x+'/'+coord.y+'.png?appid='+OWM_KEY;
      },
      tileSize:new google.maps.Size(256,256),
      opacity:0.6,
      name:'Rain'
    });
    map.overlayMapTypes.insertAt(0,_rainLayer);
  } else {
    if(map.overlayMapTypes.getLength()>0){
      for(var i=map.overlayMapTypes.getLength()-1;i>=0;i--){
        if(map.overlayMapTypes.getAt(i)&&map.overlayMapTypes.getAt(i).name==='Rain'){
          map.overlayMapTypes.removeAt(i);
        }
      }
    }
    _rainLayer=null;
  }
  showWeatherOnMap();
  rnd();
}

function checkTurns(){
  if(!gLat||_turnPoints.length===0)return;
  for(var i=0;i<_turnPoints.length;i++){
    var tp=_turnPoints[i];
    var d=dK(gLat,gLng,tp.lat,tp.lng)*1000;// メートル
    if(d<=200&&d>50&&!tp.announced200){
      tp.announced200=true;
      _showTurnArrow(tp.dir,false);
      _playTurnVoice(tp.dir,false);
    } else if(d<=50&&!tp.announced50){
      tp.announced50=true;
      _showTurnArrow(tp.dir,true);
      _playTurnVoice(tp.dir,true);
    }
    // 通過後リセット（500m以上離れたら再利用可能に）
    if(d>500&&(tp.announced200||tp.announced50)){
      tp.announced200=false;tp.announced50=false;
    }
  }
}

var _autoSearchTimers={};
function _autoSearch(sid,force){
  var nameEl=document.getElementById(sid+'Name');
  var query=nameEl?nameEl.value.trim():'';
  var suggestEl=document.getElementById(sid+'Suggest');
  if(!query||(query.length<2&&!force)){if(suggestEl)suggestEl.style.display='none';return;}
  if(_autoSearchTimers[sid])clearTimeout(_autoSearchTimers[sid]);
  function _doSearch(){
    fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(query)+'&countrycodes=jp&format=json&limit=5&accept-language=ja',{signal:AbortSignal.timeout(5000)})
    .then(function(r){return r.json();})
    .then(function(results){
      if(!suggestEl)return;
      if(results&&results.length>0){
        suggestEl.style.display='block';
        suggestEl.innerHTML=results.map(function(r){
          var name=r.display_name.split(',')[0];
          var addr=r.display_name;
          return '<div onclick="_selectPlaceDirect(\''+sid+'\','+r.lat+','+r.lon+',\''+name.replace(/'/g,"\\'")+'\',\''+addr.replace(/'/g,"\\'")+'\',this)" style="padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:13px;color:var(--txt);" ontouchstart="this.style.background=\'rgba(0,212,255,0.15)\'" ontouchend="this.style.background=\'\'">'
            +'<div style="font-weight:700;">'+name+'</div>'
            +'<div style="font-size:11px;color:var(--sub);">'+addr+'</div>'
            +'</div>';
        }).join('');
      } else {
        suggestEl.style.display='block';
        suggestEl.innerHTML='<div style="padding:10px 12px;font-size:13px;color:var(--red);">見つかりませんでした</div>';
      }
    }).catch(function(){
      if(suggestEl){suggestEl.style.display='block';suggestEl.innerHTML='<div style="padding:10px 12px;font-size:13px;color:var(--red);">検索エラー</div>';}
    });
  }
  if(force){_doSearch();}else{_autoSearchTimers[sid]=setTimeout(_doSearch,300);}
}
function _selectPlace(sid,placeId,el){
  var suggestEl=document.getElementById(sid+'Suggest');

  var service=new google.maps.places.PlacesService(document.createElement('div'));
  service.getDetails({placeId:placeId,fields:['name','geometry','formatted_address']},function(place,status){
    if(status==='OK'&&place){
      var lat=place.geometry.location.lat();
      var lng=place.geometry.location.lng();
      document.getElementById(sid+'Name').value=place.name;
      document.getElementById(sid+'Lat').value=lat;
      document.getElementById(sid+'Lng').value=lng;
      var resultEl=document.getElementById(sid+'Result');
      if(resultEl){
        resultEl.style.display='block';
        resultEl.style.borderColor='var(--grn)';
        resultEl.innerHTML='<div>📍 <b style="color:var(--grn);">'+place.name+'</b></div>'
          +'<div style="font-size:11px;color:var(--sub);">'+place.formatted_address+'</div>';

      <div style="margin-bottom:4px;">${mode==='sstr'?'<img src="https://sstr.jp/wp-content/uploads/2019/11/logo.png" style="height:60px;" onerror="this.outerHTML=\'<span style=font-size:26px;font-weight:900;color:#00d4ff>SSTR 2026</span>\'">':mode==='custom'?'<span style="font-size:26px;font-weight:900;color:var(--org);">'+title+'</span>':'<img src="greenlabel_logo.png" style="height:80px;" onerror="this.outerHTML=\'<span style=font-size:26px;font-weight:900;color:#00d4ff>'+title+'</span>\'">'}</div>

    },3000);
    return;
  }

  // 「選択されたのだ」音声 → リストタブへ遷移
  function _goMain(){
    _spkQ.length=0;_spkBusy=false;_zundaHide();
    // メロディ → 完了後に画面切替
    sGps(function(){
      if(mid.parentNode){mid.remove();}
      if(appBgm){_bgmFading=true;var _bv=appBgm.volume;var _bf=setInterval(function(){_bv=Math.max(0,_bv-0.02);if(appBgm)appBgm.volume=_bv;if(_bv<=0){stopAppBgm();_bgmFading=false;clearInterval(_bf);}},100);}
      loc();
    });
  }

  // NAS WAVがあれば使う、なければspkフォールバック
  function _playSelected(cb){
    var key=mode==='sstr'?'sstr_selected':'plan_selected';
    var a=new Audio(mode==='sstr'?new URL('voice/sstr_selected.wav',window.location.href).href:NAS_API+'/api/voice/'+key);

        _gpsOk=true;
        if(_minOk){clearInterval(_dotInterval);_goMain();}
      },function(){clearInterval(_dotInterval);_goMain();},{enableHighAccuracy:true,timeout:15000});
    });
  }

// スプラッシュ表示と同時にBGM自動再生（APKはsetMediaPlaybackRequiresUserGesture(false)済み）
playAppBgm();
// 1秒後にずんだもんが挨拶（BGM再生中に）
setTimeout(function(){
  try{
    if(appBgm)appBgm.volume=0.1;
    if(_myName){
      // 2回目: おかえり → プラン選択
      _zundaShow(_myName+'さん、おかえりなのだ！');
      var _welcomeWav=new Audio(NAS_API+'/api/voice/welcome_'+encodeURIComponent(_myName));
      _welcomeWav.volume=0.9;_welcomeWav.playbackRate=_voiceSpeed;
      _welcomeWav.onended=function(){
        _zundaShow(_myName+'さん、ツーリングプランを選ぶのだ！');
        var _planWav=new Audio(NAS_API+'/api/voice/plan_'+encodeURIComponent(_myName));
        _planWav.volume=0.9;_planWav.playbackRate=_voiceSpeed;
        _planWav.onended=function(){if(appBgm&&!_bgmFading)appBgm.volume=0.15;setTimeout(_zundaHide,1500);};
        _planWav.onerror=function(){if(appBgm&&!_bgmFading)appBgm.volume=0.15;_zundaHide();};
        _planWav.play().catch(function(){_planWav.onerror();});
      };
      _welcomeWav.onerror=function(){if(appBgm&&!_bgmFading)appBgm.volume=0.15;_zundaHide();};
      _welcomeWav.play().catch(function(){_welcomeWav.onerror();});
    } else {
      // 初回: 初めまして → 名前入力を促す
      _zundaShow('初めましてなのだ！');
      var _hajimeAudio=new Audio(NAS_API+'/api/voice/hajimemashite');
      _hajimeAudio.volume=0.9;_hajimeAudio.playbackRate=_voiceSpeed;
      _zundaMouthStart();
      _hajimeAudio.onended=function(){
        _zundaMouthStop();
        setTimeout(function(){
          _zundaShow('ライダー名を入力してほしいのだ！');
          window._splashAudio=new Audio(new URL('voice/enter_name.wav',window.location.href).href);
          window._splashAudio.volume=0.9;
          window._splashAudio.onended=function(){if(appBgm&&!_bgmFading)appBgm.volume=0.15;setTimeout(_zundaHide,2000);};
          window._splashAudio.play().catch(function(){});
        },500);
      };
      _hajimeAudio.onerror=function(){
        _zundaMouthStop();
        _zundaShow('ライダー名を入力してほしいのだ！');
        window._splashAudio=new Audio(new URL('voice/enter_name.wav',window.location.href).href);
        window._splashAudio.volume=0.9;
        window._splashAudio.onended=function(){if(appBgm&&!_bgmFading)appBgm.volume=0.15;setTimeout(_zundaHide,2000);};
        window._splashAudio.play().catch(function(){});
      };
      _hajimeAudio.play().catch(function(){_hajimeAudio.onerror();});
    }
  }catch(e){}
},1000);
// 管理者モード: スプラッシュ初期表示
if(_isAdmin){const a=document.querySelector('.adm');if(a)a.textContent='🔑 ADMIN';}
// ライダー名を入力欄に復元
var _planAnnounced=false;
var _myNameWasSet=!!_myName;// 起動時に名前があったか
function _showCards(){
  var show=_myName&&_myName.length>0;
  var d=show?'block':'none';
  var cs=document.getElementById('cardSstr');if(cs)cs.style.display=d;
  var cn1=document.getElementById('cardNippon1');if(cn1)cn1.style.display=d;
  var cn2=document.getElementById('cardNippon2');if(cn2)cn2.style.display=d;
  var cc=document.getElementById('cardCreate');if(cc)cc.style.display=d;
  // 保存済みカスタムプラン表示
  var cpContainer=document.getElementById('customPlanCards');
  if(cpContainer)cpContainer.remove();
  if(show){
    var plans=JSON.parse(localStorage.getItem('_plans_'+_myName)||'[]');
    if(plans.length>0){
      var cp=document.createElement('div');cp.id='customPlanCards';
      cp.style.cssText='width:100%;display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;';
      plans.forEach(function(p,i){
        var logoHtml=p.logo?'<img src="'+p.logo+'" style="height:28px;border-radius:6px;">':'<span style="font-size:18px;font-weight:900;">'+p.name.charAt(0)+'</span>';
        cp.innerHTML+='<div style="position:relative;width:calc(50% - 4px);">'
          +'<button onclick="_startCustomPlan('+i+')" style="background:rgba(6,6,12,0.15);border:2px solid var(--org);border-radius:12px;padding:12px;text-align:left;cursor:pointer;color:inherit;font-family:inherit;width:100%;box-sizing:border-box;backdrop-filter:blur(2px);">'
          +'<div style="font-size:9px;color:var(--org);letter-spacing:2px;font-weight:700;margin-bottom:2px;">'+(p.date||'日付未定')+'</div>'
          +'<div style="display:flex;align-items:center;gap:6px;">'+logoHtml+'<span style="font-size:13px;font-weight:900;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+p.name+'</span></div>'
          +'<div style="font-size:10px;color:#aaa;margin-top:2px;">'+p.stops.length+'スポット</div>'
          +'</button>'
          +'<button onclick="event.stopPropagation();_deleteCustomPlan('+i+')" style="position:absolute;top:4px;right:4px;background:rgba(255,68,68,0.2);border:1px solid var(--red);border-radius:50%;width:22px;height:22px;color:var(--red);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>'
          +'</div>';
      });
      var cardArea=document.querySelector('#cardCreate');
      if(cardArea&&cardArea.parentElement)cardArea.parentElement.insertBefore(cp,cardArea);
    }
  }
  // 名前をOKボタンで入力した時のみ音声再生（おかえりの時は2秒タイマーが担当）
  if(show&&!_planAnnounced&&!_myNameWasSet){
    _planAnnounced=true;
    if(appBgm)appBgm.volume=0.1;
    _zundaShow('ツーリングプランを選ぶのだ！');
    var _pw=new Audio(new URL('voice/splash_welcome.wav',window.location.href).href);
    _pw.volume=0.9;_pw.playbackRate=_voiceSpeed;
    _pw.onended=function(){if(appBgm&&!_bgmFading)appBgm.volume=0.15;setTimeout(_zundaHide,1500);};
    _pw.play().catch(function(){});
  }
}
var _rni=document.getElementById('riderNameInput');
if(_rni){
  if(_myName){_rni.value=_myName;_rni.parentElement.style.display='none';}
}
_showCards();
// スプラッシュのAPIカウンター更新（管理者のみ）
// 管理者モード: Cloud Functionから実API使用量を取得
let _cloudStats=null;
function fetchCloudStats(){
  if(!_isAdmin)return;
  fetch('https://as5304t-c025.tail5d5c21.ts.net/api/usage',{signal:AbortSignal.timeout(5000)})
    .then(r=>r.json())
    .then(d=>{_cloudStats=d;_apiMaps=d.maps;_apiDir=d.directions;_apiSave();})
    .catch(()=>{
      // NAS Funnel失敗時はCloud Functionsにフォールバック
      fetch('https://asia-northeast1-sstr-492316.cloudfunctions.net/sstr-api/stats')
        .then(r=>r.json())
        .then(d=>{_cloudStats=d;_apiMaps=d.maps;_apiDir=d.directions;_apiSave();})
        .catch(()=>{});
    });
}
if(_isAdmin)fetchCloudStats();
setInterval(()=>{if(_isAdmin&&document.getElementById('splash'))fetchCloudStats();},10800000);// 3時間ごと
setInterval(()=>{const el=document.getElementById('apiCntSplash');if(el)el.textContent=_isAdmin?'Maps:'+_apiMaps.toString().padStart(5,'0')+' Dir:'+_apiDir.toString().padStart(5,'0'):'';},1000);
</script>
</body>
</html>
